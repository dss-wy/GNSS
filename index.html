<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GNSS网页版上位机</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-shell">
        <nav class="menu-tabs" aria-label="主菜单">
          <button class="menu-tab active">连接</button>
          <button class="menu-tab">视图</button>
          <button class="menu-tab">工具</button>
          <button class="menu-tab">回放</button>
          <button class="menu-tab">设置</button>
          <button class="menu-tab">帮助</button>
        </nav>
        <div class="tool-strip">
          <button id="connectButton" class="primary-action">打开串口</button>
          <button id="disconnectButton">断开</button>
          <label class="field-inline">
            <span>波特率</span>
            <select id="baudRate">
              <option value="9600" selected>9600</option>
              <option value="38400">38400</option>
              <option value="57600">57600</option>
              <option value="115200">115200</option>
              <option value="230400">230400</option>
            </select>
          </label>
          <button id="replayButton">示例回放</button>
          <button id="pauseButton">暂停</button>
          <button id="loadFileButton">加载日志</button>
          <button id="clearButton">清空</button>
          <input id="fileInput" type="file" accept=".txt,.log,.nmea,.csv" />
        </div>
      </header>

      <main class="workspace">
        <section class="panel nmea-panel">
          <div class="panel-title">
            <span>NMEA视图</span>
            <div class="window-tools"><button></button><button></button><button></button></div>
          </div>
          <div class="nmea-output" id="nmeaLog"></div>
          <div class="send-row">
            <select id="commandMode" aria-label="发送格式">
              <option value="ascii">ascii</option>
              <option value="hex">hex</option>
            </select>
            <input id="commandInput" type="text" aria-label="发送内容" />
            <button id="sendButton">发送</button>
          </div>
        </section>

        <section class="panel satellite-panel">
          <div class="panel-title">
            <span>卫星视图</span>
            <div class="window-tools"><button></button><button></button><button></button></div>
          </div>
          <div class="satellite-filter">
            <label><input type="checkbox" data-system="GPS" checked /><span class="dot gps"></span>GPS</label>
            <label><input type="checkbox" data-system="GLC" checked /><span class="dot glc"></span>GLC</label>
            <label><input type="checkbox" data-system="GAI" checked /><span class="dot gai"></span>GAI</label>
            <label><input type="checkbox" data-system="BDS" checked /><span class="dot bds"></span>BDS</label>
            <label><input type="checkbox" data-system="IRN" checked /><span class="dot irn"></span>IRN</label>
            <label><input type="checkbox" id="inViewOnly" />InView</label>
          </div>
          <div class="canvas-wrap">
            <canvas id="skyCanvas"></canvas>
          </div>
        </section>

        <section class="panel signal-panel">
          <div class="panel-title">
            <span>信号视图</span>
            <div class="window-tools"><button></button><button></button><button></button></div>
          </div>
          <div class="signal-legend" id="signalLegend"></div>
          <div class="canvas-wrap">
            <canvas id="signalCanvas"></canvas>
          </div>
        </section>

        <section class="panel message-panel">
          <div class="panel-title">
            <span>消息视图</span>
            <div class="window-tools"><button></button><button></button><button></button></div>
          </div>
          <div class="message-layout">
            <aside class="message-tree">
              <div class="tree-root">NMEA</div>
              <button data-type="GGA">GGA（全球定位系统定位信息）<span id="countGGA">0</span></button>
              <button data-type="GLL">GLL（地理定位-纬度/经度）<span id="countGLL">0</span></button>
              <button data-type="GSA">GSA（当前卫星信息）<span id="countGSA">0</span></button>
              <button data-type="GSV" class="active">GSV（可见卫星信息）<span id="countGSV">0</span></button>
              <button data-type="RMC">RMC（推荐定位信息）<span id="countRMC">0</span></button>
              <button data-type="VTG">VTG（地面航向和地面速度）<span id="countVTG">0</span></button>
              <div class="tree-root muted">ICOE</div>
            </aside>
            <div class="satellite-table-wrap">
              <div class="visible-count">可视卫星数：<strong id="visibleSatelliteCount">0</strong></div>
              <table class="satellite-table">
                <thead>
                  <tr>
                    <th>卫星系统</th>
                    <th>卫星号</th>
                    <th>高度角</th>
                    <th>方位角</th>
                    <th>信噪比</th>
                  </tr>
                </thead>
                <tbody id="satelliteRows"></tbody>
              </table>
            </div>
          </div>
        </section>

        <section class="panel scatter-panel">
          <div class="panel-title">
            <span>散点图</span>
            <div class="window-tools"><button></button><button></button><button></button></div>
          </div>
          <div class="scatter-layout">
            <div class="canvas-wrap">
              <canvas id="scatterCanvas"></canvas>
            </div>
            <aside class="scatter-controls">
              <label><input type="radio" name="centerMode" value="mouse" />MouseClick</label>
              <label><input type="radio" name="centerMode" value="current" checked />CenterToCurrent</label>
              <label><input type="radio" name="centerMode" value="specified" />SpecifiedCenter</label>
              <label>Lon:<input id="centerLon" type="text" /></label>
              <label>Lat:<input id="centerLat" type="text" /></label>
              <button id="applyCenterButton" disabled>Apply</button>
              <button id="saveScatterButton">保存</button>
              <button id="clearScatterButton">清除</button>
            </aside>
          </div>
        </section>

        <section class="panel map-panel">
          <div class="panel-title">
            <span>地图视图</span>
            <div class="window-tools"><button></button><button></button><button></button></div>
          </div>
          <div class="map-layout">
            <form class="position-form">
              <label>UTC<input id="utcValue" readonly /></label>
              <label>经度<input id="lonValue" readonly /></label>
              <label>纬度<input id="latValue" readonly /></label>
              <label>高程<input id="altValue" readonly /></label>
              <label>速度<input id="speedValue" readonly /></label>
              <label>朝向<input id="courseValue" readonly /></label>
              <label>卫星<input id="satCountValue" readonly /></label>
              <label>HDOP<input id="hdopValue" readonly /></label>
              <label>VDOP<input id="vdopValue" readonly /></label>
              <label>模式<input id="modeValue" readonly /></label>
            </form>
            <div class="map-stage">
              <canvas id="mapCanvas"></canvas>
              <div class="map-zoom">
                <button id="zoomInButton">+</button>
                <button id="zoomOutButton">-</button>
              </div>
              <div class="map-mode">
                <label><input type="radio" name="mapMode" value="road" checked />Road Map</label>
                <label><input type="radio" name="mapMode" value="satellite" />Satellite</label>
              </div>
            </div>
          </div>
        </section>
      </main>

      <aside class="side-toolbox" aria-label="扩展工具">
        <button>UTC<br />SOW</button>
        <button>IC</button>
        <button>IMU</button>
        <button>Reset</button>
        <button>BLH<br />XYZ</button>
        <button>Iono</button>
        <button>RTCM</button>
      </aside>

      <footer class="status-bar">
        <div id="connectionState">未连接</div>
        <div id="logState">日志未保存</div>
        <div id="sourceState">观测量未输出</div>
        <div id="debugState">调试log未输出</div>
        <div class="led" id="statusLed"></div>
        <div id="fixState">未定位</div>
        <div id="idleState">空闲</div>
        <div id="epochState">-1/0</div>
        <div id="runtimeState">运行时间00:00:00</div>
      </footer>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
