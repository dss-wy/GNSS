name: Deploy CORVON TOF

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Copy static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp tool.html _site/
          cp site.css _site/
          cp styles.css _site/
          cp app.js _site/
          cp CORVON.ico _site/
          cp "CORVON GNSS Tool操作说明书v1.0.pdf" _site/
          cp -r assets _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
